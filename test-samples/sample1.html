<!DOCTYPE html>
<html>
<head>
    <title>Sample HTML with Images</title>
</head>
<body>
    <h1>Welcome to My Page</h1>
    <p>This is a sample HTML page with embedded images.</p>
    
    <!-- Image with data URL (base64) -->
    <img src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" alt="1x1 red pixel" />
    
    <p>Here's some text between images.</p>
    
    <!-- External image URL -->
    <img src="https://via.placeholder.com/150x100/FF0000/FFFFFF?text=Sample" alt="Sample placeholder image" />
    
    <p>More content after the images.</p>
</body>
</html>
